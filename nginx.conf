map $http_user_agent $truthshield_social_bot {
    default 0;
    ~*(facebookexternalhit|facebot|threads|meta-externalagent|meta-externalfetcher|twitterbot|linkedinbot|slackbot|discordbot|telegrambot|whatsapp) 1;
}

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    location = /ready {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location ^~ /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location = /truthshield-extension.zip {
        add_header Cache-Control "public, max-age=300";
        try_files /truthshield-extension.zip =404;
    }

    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-store";
        try_files /manifest.webmanifest =404;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    error_page 418 = @event_share_preview;

    location ~ ^/events/[^/]+$ {
        if ($truthshield_social_bot) {
            return 418;
        }

        add_header Cache-Control "no-store";
        try_files $uri $uri/ /index.html;
    }

    location @event_share_preview {
        internal;
        rewrite ^ /share$uri break;
        proxy_pass https://truth-shield-api.otus.tw;
        proxy_ssl_server_name on;
        proxy_set_header Host truth-shield-api.otus.tw;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        add_header Cache-Control "no-store";
        try_files $uri $uri/ /index.html;
    }
}
