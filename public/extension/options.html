<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TruthShield 設定</title>
    <style>
      body { margin: 0; background: #09090b; color: #f4f4f5; font: 14px system-ui, sans-serif; }
      main { max-width: 680px; margin: 0 auto; padding: 28px; }
      p { color: #a1a1aa; line-height: 1.6; }
      label { display: block; margin: 18px 0; color: #a1a1aa; }
      input { width: 100%; box-sizing: border-box; margin-top: 8px; border: 1px solid #27272a; border-radius: 8px; background: #18181b; color: #fff; padding: 10px; }
      button { border: 0; border-radius: 8px; background: #67e8f9; color: #09090b; padding: 10px 14px; font-weight: 700; cursor: pointer; }
      .brand { display: flex; align-items: center; gap: 12px; }
      .brand img { width: 44px; height: 44px; }
      .brand h1 { margin: 0; }
      .row { display: flex; gap: 10px; align-items: center; }
      .row input { width: auto; }
      .panel { border: 1px solid #27272a; border-radius: 10px; background: #111113; padding: 16px; margin-top: 16px; }
      #status { margin-top: 12px; color: #86efac; }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <img src="icons/icon-48.png" alt="" />
        <h1 data-i18n="settingsTitle" data-i18n-title="settingsTitle">TruthShield 設定</h1>
      </div>
      <p data-i18n="settingsIntro">一般使用者只需要確認官網與 API 來源正確。滑過提示是低干擾提醒，新聞頁橫幅是主要入口。</p>
      <section class="panel">
        <h2 data-i18n="connectionOrigins">連線來源</h2>
        <label><span data-i18n="webOrigin">官網 / 內嵌頁來源</span> <input id="tooltipOrigin" /></label>
        <label><span data-i18n="apiOrigin">API 來源</span> <input id="apiOrigin" /></label>
      </section>
      <section class="panel">
        <h2 data-i18n="displayPrefs">顯示偏好</h2>
        <label class="row"><input id="enableTooltip" type="checkbox" /> <span data-i18n="enableTooltip">啟用滑過標籤提示</span></label>
        <label class="row"><input id="enablePanel" type="checkbox" /> <span data-i18n="enablePanel">進入新聞頁時顯示頂部 TruthShield 橫幅</span></label>
        <label class="row"><input id="enableReportButton" type="checkbox" /> <span data-i18n="enableReportButton">顯示未收錄新聞站回報按鈕</span></label>
      </section>
      <button id="save" data-i18n="save">儲存</button>
      <button id="checkHealth" type="button" data-i18n="checkHealth">檢查 API 健康狀態</button>
      <button id="checkWeb" type="button" data-i18n="checkWeb">檢查官網連線</button>
      <div id="status"></div>
      <div id="health"></div>
      <div id="webHealth"></div>
      <p id="version"></p>
    </main>
    <script src="extension-i18n.js"></script>
    <script src="options.js"></script>
  </body>
</html>
