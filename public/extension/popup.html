<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TruthShield</title>
    <style>
      body {
        width: 330px;
        margin: 0;
        background: #09090b;
        color: #f4f4f5;
        font: 13px system-ui, sans-serif;
      }
      main { padding: 16px; }
      h1 { font-size: 16px; margin: 0; }
      .brand { display: flex; align-items: center; gap: 10px; }
      .brand img { width: 36px; height: 36px; }
      p { margin: 6px 0 0; color: #a1a1aa; line-height: 1.5; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
      .card { border: 1px solid #27272a; border-radius: 8px; padding: 10px; background: #18181b; }
      .label { color: #a1a1aa; font-size: 11px; }
      .value { margin-top: 4px; font-weight: 700; font-size: 18px; }
      .target {
        margin-top: 12px;
        border: 1px solid #27272a;
        border-radius: 8px;
        padding: 10px;
        background: #111113;
        color: #d4d4d8;
        word-break: break-all;
      }
      button {
        width: 100%;
        margin-top: 8px;
        border: 1px solid #27272a;
        border-radius: 8px;
        background: #18181b;
        color: #f4f4f5;
        padding: 10px;
        font-weight: 700;
        cursor: pointer;
        text-align: left;
      }
      button.primary {
        border-color: #67e8f9;
        background: #67e8f9;
        color: #09090b;
      }
      button:disabled { cursor: not-allowed; opacity: .48; }
      a { display: block; margin-top: 10px; color: #67e8f9; text-decoration: none; font-weight: 700; }
      #status { min-height: 18px; margin-top: 10px; color: #86efac; }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <img src="icons/icon-48.png" alt="" />
        <h1>TruthShield</h1>
      </div>
      <p data-i18n="popupIntro">新聞頁會顯示頂部橫幅；點擊橫幅可開啟投票與證據面板。連結也可用右鍵查看或回報。</p>

      <div class="grid">
        <div class="card"><div class="label" data-i18n="monitoredDomains">監控網域</div><div id="domains" class="value">-</div></div>
        <div class="card"><div class="label" data-i18n="votes">投票數</div><div id="votes" class="value">-</div></div>
      </div>

      <div class="target">
        <div class="label" data-i18n="currentTab">目前分頁</div>
        <div id="currentUrl" data-i18n="loading">讀取中...</div>
      </div>

      <button id="openStatus" class="primary" data-i18n="openStatus">查看目前頁面評分</button>
      <button id="openVote" data-i18n="openVote">開啟投票與證據面板</button>
      <button id="openReport" data-i18n="openReport">回報未收錄或分類錯誤</button>
      <button id="openDemo" data-i18n="openDemo">開啟本地測試新聞頁</button>
      <button id="openReadiness" data-i18n="openReadiness">開啟願景準備中心</button>
      <button id="openHealth" data-i18n="openHealth">開啟系統健康狀態</button>

      <a id="openHub" href="#" data-i18n="openHub">開啟真相總部</a>
      <a id="openOptions" href="#" data-i18n="settings">設定</a>
      <div id="status"></div>
    </main>
    <script src="extension-i18n.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
