<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TruthShield</title>
    <style>
      body {
        width: 330px;
        margin: 0;
        background: #09090b;
        color: #f4f4f5;
        font: 13px system-ui, sans-serif;
      }
      main { padding: 16px; }
      h1 { font-size: 16px; margin: 0; }
      .brand { display: flex; align-items: center; gap: 10px; }
      .brand img { width: 36px; height: 36px; }
      p { margin: 6px 0 0; color: #a1a1aa; line-height: 1.5; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
      .card { border: 1px solid #27272a; border-radius: 8px; padding: 10px; background: #18181b; }
      .label { color: #a1a1aa; font-size: 11px; }
      .value { margin-top: 4px; font-weight: 700; font-size: 18px; }
      .target {
        margin-top: 12px;
        border: 1px solid #27272a;
        border-radius: 8px;
        padding: 10px;
        background: #111113;
        color: #d4d4d8;
        word-break: break-all;
      }
      .auth {
        margin-top: 12px;
        border: 1px solid #164e63;
        border-radius: 8px;
        padding: 10px;
        background: rgba(8, 145, 178, .08);
      }
      .auth strong { display:block; color:#cffafe; font-size:12px; }
      .auth span { display:block; margin-top:4px; color:#a1a1aa; font-size:12px; line-height:1.4; word-break:break-word; }
      .auth-actions { display:flex; gap:8px; margin-top:10px; }
      .auth-actions button { margin-top:0; padding:8px; text-align:center; }
      .auth-actions .danger { border-color:#7f1d1d; background:rgba(127,29,29,.35); color:#fecaca; }
      .onboarding {
        margin-top: 12px;
        border: 1px solid rgba(103,232,249,.25);
        border-radius: 8px;
        padding: 10px;
        background: rgba(8,145,178,.08);
      }
      .onboarding-title { display:flex; align-items:center; justify-content:space-between; gap:8px; color:#cffafe; font-weight:700; font-size:12px; }
      .onboarding ol { margin: 8px 0 0; padding-left: 18px; color:#d4d4d8; font-size:12px; line-height:1.55; }
      .onboarding-actions { display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:10px; }
      .onboarding-actions button { margin-top:0; padding:8px; font-size:12px; text-align:center; }
      .dismiss { width:auto; margin:0; border:0; background:transparent; color:#67e8f9; padding:0; font-size:11px; }
      .debug {
        margin-top: 12px;
        border: 1px solid #27272a;
        border-radius: 8px;
        background: #111113;
        padding: 10px;
      }
      .debug strong { display:block; color:#cffafe; font-size:12px; }
      .debug-grid { display:grid; gap:6px; margin-top:8px; }
      .debug-row { display:flex; align-items:center; justify-content:space-between; gap:8px; border:1px solid #27272a; border-radius:6px; padding:7px 8px; background:#18181b; }
      .debug-row span:first-child { color:#a1a1aa; font-size:11px; }
      .debug-pill { border-radius:999px; padding:2px 7px; font-size:11px; font-weight:700; white-space:nowrap; }
      .debug-pill.ok { background:rgba(16,185,129,.16); color:#a7f3d0; }
      .debug-pill.warn { background:rgba(245,158,11,.16); color:#fde68a; }
      .debug-pill.bad { background:rgba(239,68,68,.16); color:#fecaca; }
      .debug small { display:block; margin-top:8px; color:#71717a; line-height:1.45; word-break:break-word; }
      .repair-actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
      .repair-actions button { margin-top:0; padding:8px; font-size:12px; text-align:center; }
      .achievement {
        margin-top:12px;
        border:1px solid rgba(103,232,249,.22);
        border-radius:8px;
        padding:10px;
        background:rgba(255,255,255,.035);
      }
      .achievement strong { display:block; color:#cffafe; font-size:12px; }
      .achievement p { font-size:12px; }
      button {
        width: 100%;
        margin-top: 8px;
        border: 1px solid #27272a;
        border-radius: 8px;
        background: #18181b;
        color: #f4f4f5;
        padding: 10px;
        font-weight: 700;
        cursor: pointer;
        text-align: left;
      }
      button.primary {
        border-color: #67e8f9;
        background: #67e8f9;
        color: #09090b;
      }
      button:disabled { cursor: not-allowed; opacity: .48; }
      .link-button { width:auto; margin-top:10px; border:0; background:transparent; color:#67e8f9; padding:0; text-decoration:none; font-weight:700; }
      #status { min-height: 18px; margin-top: 10px; color: #86efac; }

      /* Tab bar */
      .tab-bar {
        display: flex;
        gap: 0;
        margin: 12px -16px 0;
        padding: 0 16px;
        border-bottom: 1px solid #27272a;
      }
      .tab-btn {
        width: auto;
        margin: 0;
        padding: 8px 16px;
        border: none;
        border-bottom: 2px solid transparent;
        border-radius: 0;
        background: transparent;
        color: #71717a;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        text-align: center;
      }
      .tab-btn.tab-active { color: #67e8f9; border-bottom-color: #67e8f9; }
      .tab-btn:hover:not(.tab-active) { color: #d4d4d8; }

      /* Events panel */
      .search-row { display: flex; gap: 6px; margin-top: 12px; }
      .search-input {
        flex: 1;
        border: 1px solid #27272a;
        border-radius: 8px;
        background: #18181b;
        color: #f4f4f5;
        padding: 8px 10px;
        font-size: 12px;
        outline: none;
        min-width: 0;
      }
      .search-input:focus { border-color: #67e8f9; }
      .search-btn {
        width: auto;
        margin: 0;
        padding: 8px 14px;
        border: 1px solid #27272a;
        border-radius: 8px;
        background: #18181b;
        color: #f4f4f5;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
      }
      .events-action-row { display: flex; gap: 6px; margin-top: 8px; }
      .event-item {
        margin-top: 8px;
        border: 1px solid #27272a;
        border-radius: 8px;
        padding: 10px;
        background: #18181b;
      }
      .event-name { font-weight: 700; font-size: 13px; color: #f4f4f5; }
      .event-meta { margin-top: 3px; font-size: 11px; color: #71717a; }
      .event-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; align-items: center; }
      .btn-sm {
        margin: 0;
        width: auto;
        padding: 5px 10px;
        border: 1px solid #27272a;
        border-radius: 6px;
        background: #09090b;
        color: #f4f4f5;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
      }
      .btn-sm.cyan { border-color: #67e8f9; color: #67e8f9; }

      /* Event detail panel */
      .detail-header { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
      .back-btn {
        margin: 0;
        width: auto;
        padding: 5px 10px;
        border: 1px solid #27272a;
        border-radius: 6px;
        background: #09090b;
        color: #a1a1aa;
        font-size: 12px;
        cursor: pointer;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .detail-event-name {
        margin: 0;
        font-size: 13px;
        font-weight: 700;
        color: #f4f4f5;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .detail-tab-bar { margin-top: 10px; }
      .detail-scroll { max-height: 460px; overflow-y: auto; margin-top: 10px; padding-right: 2px; }
      .detail-scroll::-webkit-scrollbar { width: 4px; }
      .detail-scroll::-webkit-scrollbar-track { background: transparent; }
      .detail-scroll::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }

      /* Timeline entries */
      .tl-list { padding-left: 8px; border-left: 2px solid rgba(103,232,249,0.2); }
      .tl-entry { position: relative; padding: 0 0 14px 14px; }
      .tl-entry::before {
        content: '';
        position: absolute;
        left: -5px;
        top: 3px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        border: 1px solid #67e8f9;
        background: #09090b;
      }
      .tl-time { font-size: 10px; color: #71717a; }
      .tl-title { font-size: 12px; font-weight: 700; color: #f4f4f5; margin-top: 2px; line-height: 1.4; }
      .tl-summary { font-size: 11px; color: #a1a1aa; margin-top: 3px; line-height: 1.45; }
      .tl-link { font-size: 10px; color: #67e8f9; margin-top: 4px; display: block; word-break: break-all; text-decoration: none; }
      .tl-link:hover { color: #cffafe; }

      /* Misc */
      .panel-msg { font-size: 12px; color: #a1a1aa; margin-top: 10px; }
      .panel-err { font-size: 12px; color: #fca5a5; margin-top: 10px; }
      .empty-state { margin-top: 12px; border: 1px solid #27272a; border-radius: 8px; padding: 14px; background: #18181b; }
      .empty-state p { margin: 0 0 8px; font-size: 12px; color: #a1a1aa; line-height: 1.5; }
      .empty-state p:last-child { margin-bottom: 0; }
      .empty-state strong { color: #f4f4f5; }
      .add-btn { margin-bottom: 8px; }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <img src="icons/icon-48.png" alt="" />
        <h1>TruthShield</h1>
      </div>

      <nav class="tab-bar">
        <button id="tab-status" class="tab-btn tab-active" data-i18n="tabStatus">狀態</button>
        <button id="tab-events" class="tab-btn" data-i18n="tabEvents">事件</button>
      </nav>

      <!-- Status panel (existing content) -->
      <div id="panel-status">
        <p data-i18n="popupIntro">新聞頁會顯示頂部橫幅；點擊橫幅可開啟投票與證據面板。連結也可用右鍵查看或回報。</p>

        <div id="onboarding" class="onboarding" hidden>
          <div class="onboarding-title">
            <span data-i18n="onboardingTitle">第一次使用 TruthShield</span>
            <button id="dismissOnboarding" class="dismiss" type="button" data-i18n="dismissOnboarding">知道了</button>
          </div>
          <ol>
            <li data-i18n="onboardingStep1">先同步官網登入狀態。</li>
            <li data-i18n="onboardingStep2">打開互動示範確認橫幅、右鍵與投票面板。</li>
            <li data-i18n="onboardingStep3">到新聞頁閱讀後再投票或補證據。</li>
          </ol>
          <div class="onboarding-actions">
            <button id="openDemo" type="button" data-i18n="openDemo">開啟 Demo</button>
            <button id="openGuide" type="button" data-i18n="openGuide">閱讀手冊</button>
          </div>
        </div>

        <div class="grid">
          <div class="card"><div class="label" data-i18n="monitoredDomains">監控網域</div><div id="domains" class="value">-</div></div>
          <div class="card"><div class="label" data-i18n="votes">投票數</div><div id="votes" class="value">-</div></div>
          <div class="card"><div class="label" data-i18n="apiStatus">API 狀態</div><div id="apiStatus" class="value">-</div></div>
          <div class="card"><div class="label" data-i18n="version">版本</div><div id="version" class="value">-</div></div>
        </div>

        <div class="target">
          <div class="label" data-i18n="currentTab">目前分頁</div>
          <div id="currentUrl" data-i18n="loading">讀取中...</div>
        </div>

        <div class="auth">
          <strong id="authStatus" data-i18n="authChecking">登入狀態檢查中</strong>
          <span id="authUser" data-i18n="authHint">如果你已在官網登入，插件會自動同步。</span>
          <div class="auth-actions">
            <button id="resyncAuth" type="button" data-i18n="resyncAuth">重新同步登入</button>
            <button id="openLogin" type="button" data-i18n="signIn">登入</button>
            <button id="signOut" class="danger" type="button" data-i18n="signOut" hidden>登出</button>
          </div>
        </div>

        <div class="debug">
          <strong data-i18n="pageDiagnostics">頁面診斷</strong>
          <div id="pageDebug" class="debug-grid"></div>
          <small id="pageDebugHint"></small>
          <div class="repair-actions">
            <button id="repairReport" type="button" data-i18n="repairReport">回報此頁</button>
            <button id="repairShowBanner" type="button" data-i18n="repairShowBanner">重新顯示橫幅</button>
            <button id="repairHealth" type="button" data-i18n="repairHealth">檢查 API</button>
            <button id="repairGuide" type="button" data-i18n="repairGuide">看排除說明</button>
          </div>
        </div>

        <div id="achievementCard" class="achievement" hidden>
          <strong data-i18n="achievementCardTitle">今日貢獻</strong>
          <p id="achievementText"></p>
          <button id="openProfile" type="button" class="link-button" data-i18n="openProfile">開啟個人頁</button>
        </div>

        <button id="openStatus" class="primary" data-i18n="openStatus">查看目前頁面評分</button>
        <button id="openVote" data-i18n="openVote">開啟投票與證據面板</button>
        <button id="openReport" data-i18n="openReport">回報未收錄或分類錯誤</button>
        <button id="openReadiness" data-i18n="openReadiness">開啟願景準備中心</button>
        <button id="openHealth" data-i18n="openHealth">開啟系統健康狀態</button>
        <button id="openBugReport" data-i18n="openBugReport">回報 Bug 或安全問題</button>
        <button id="openInstall" data-i18n="openInstall">下載與安裝教學</button>
        <button id="openMobile" data-i18n="openMobile">開啟手機版入口</button>

        <button id="openHub" class="link-button" type="button" data-i18n="openHub">開啟真相總部</button>
        <button id="openOptions" class="link-button" type="button" data-i18n="settings">設定</button>
        <div id="status"></div>
      </div>

      <!-- Events panel -->
      <div id="panel-events" hidden>
        <div class="search-row">
          <input id="event-search-input" class="search-input" data-i18n-placeholder="eventsSearchPlaceholder" />
          <button id="event-search-btn" class="search-btn" data-i18n="eventsSearch">搜尋</button>
        </div>
        <div class="events-action-row">
          <button id="events-create-btn" class="btn-sm cyan">＋ 建立新事件</button>
          <button id="events-refresh-btn" class="btn-sm">↺ 重新整理</button>
        </div>
        <div id="events-list-content"></div>
      </div>

      <!-- Event detail panel -->
      <div id="panel-event-detail" hidden>
        <div class="detail-header">
          <button id="detail-back" class="back-btn" data-i18n="detailBack">← 返回</button>
          <p id="detail-event-name" class="detail-event-name"></p>
          <button id="detail-refresh-btn" class="back-btn" title="重新整理">↺</button>
        </div>
        <nav class="tab-bar detail-tab-bar">
          <button id="detail-tab-timeline" class="tab-btn tab-active" data-i18n="detailTabTimeline">時間線</button>
          <button id="detail-tab-graph" class="tab-btn" data-i18n="detailTabGraph">關係圖</button>
        </nav>
        <div id="detail-timeline-content" class="detail-scroll"></div>
        <div id="detail-graph-content" class="detail-scroll" hidden></div>
      </div>
    </main>
    <script src="extension-i18n.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
