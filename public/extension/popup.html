<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TruthShield</title>
    <style>
      body { width: 280px; margin: 0; background: #09090b; color: #f4f4f5; font: 13px system-ui, sans-serif; }
      main { padding: 16px; }
      h1 { font-size: 16px; margin: 0 0 12px; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .card { border: 1px solid #27272a; border-radius: 8px; padding: 10px; background: #18181b; }
      .label { color: #a1a1aa; font-size: 11px; }
      .value { margin-top: 4px; font-weight: 700; font-size: 18px; }
      a { display: block; margin-top: 10px; color: #67e8f9; text-decoration: none; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <h1>TruthShield</h1>
      <div class="grid">
        <div class="card"><div class="label">Domains</div><div id="domains" class="value">-</div></div>
        <div class="card"><div class="label">Votes</div><div id="votes" class="value">-</div></div>
      </div>
      <a id="openHub" href="#">Open Truth Hub</a>
      <a id="openOptions" href="#">Settings</a>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
